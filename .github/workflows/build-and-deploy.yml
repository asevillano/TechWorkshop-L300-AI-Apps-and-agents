name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}"
          docker build \
            --file src/Dockerfile \
            --tag "$IMAGE" \
            src/
          docker push "$IMAGE"

      - name: Sync Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --secrets \
              "foundry-endpoint=${{ secrets.FOUNDRY_ENDPOINT }}" \
              "gpt-endpoint=${{ secrets.gpt_endpoint }}" \
              "embedding-endpoint=${{ secrets.embedding_endpoint }}" \
              "phi-4-endpoint=${{ secrets.phi_4_endpoint }}"

      - name: Update Azure Container App image and environment variables
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}"
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --set-env-vars \
              "FOUNDRY_ENDPOINT=secretref:foundry-endpoint" \
              "gpt_endpoint=secretref:gpt-endpoint" \
              "embedding_endpoint=secretref:embedding-endpoint" \
              "phi_4_endpoint=secretref:phi-4-endpoint"
